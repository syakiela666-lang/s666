<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, shrink-to-fit=no, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="./manifest.json">
    <title>Sniper</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script type="module" crossorigin src="/assets/index-CLB3V6kB.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-BUm1LVze.css">
  <link rel="manifest" href="/manifest.webmanifest"><script id="vite-plugin-pwa:register-sw" src="/registerSW.js"></script></head>
  <body>
    <div class="app-container">
      <main id="single-chart-container">
        <!-- Single chart will be injected here -->
      </main>
      <!-- Indicator Settings Modal -->
      <div id="settings-modal" class="modal-overlay" style="display: none; z-index: 10000; justify-content: center; align-items: center; background: rgb(0, 0, 0);">
        <div class="modal-content" style="width: 420px; max-width: 96%; background: #1e222d; padding: 14px; border-radius: 12px; border: 1px solid #333; max-height: 95dvh; display: flex; flex-direction: column; overflow: hidden;">
          <h3 style="color: #fff; margin-top: 0; margin-bottom: 8px; border-bottom: 1px solid #333; padding-bottom: 8px; font-size: 15px; flex-shrink: 0;">⚙️ Indicator Settings</h3>
          <div id="settings-form" style="display: flex; flex-direction: column; gap: 6px; flex: 1; overflow-y: auto; overflow-x: hidden; padding-right: 4px; -webkit-overflow-scrolling: touch;">
            <!-- Settings rows will be generated here -->
          </div>
          <div style="display: flex; justify-content: flex-end; gap: 10px; margin-top: 10px; border-top: 1px solid #333; padding-top: 10px; flex-shrink: 0;">
            <button id="settings-cancel-btn" style="background: #333; color: #fff; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 14px; min-height: 40px; min-width: 70px; touch-action: manipulation;">Cancel</button>
            <button id="settings-save-btn" style="background: #2962FF; color: #fff; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 14px; min-height: 40px; min-width: 70px; touch-action: manipulation;">Save</button>
          </div>
        </div>
      </div>

      <!-- Coin Selector Modal -->
      <div id="coin-selector-modal" class="modal-overlay">
        <div class="modal-content">
          <div class="modal-header">
            <input type="text" id="coin-search" placeholder="Search symbol..." autocomplete="off" />
            <button id="toggle-favorites" class="fav-filter-btn" title="Toggle Favorites Only">⭐ Favorites</button>
          </div>
          <div class="modal-list-header">
            <div class="col-symbol">Symbol</div>
            <div class="col-price">Last Price</div>
            <div class="col-change" id="sort-change" style="cursor:pointer;" title="Sort by 24h Change">24h Chg ↕</div>
          </div>
          <div id="coin-list" class="modal-list">
            <div class="loading-text">Loading USDT Futures...</div>
          </div>
        </div> <!-- Penutup modal-content -->
      </div> <!-- Penutup modal-overlay -->

      <!-- Scanner Floating Panel -->






      <div id="toast-container" class="toast-container"></div>
      
      <!-- Top Control Panel (Refresh, Snap, TF) -->
      <div class="control-panel-top" style="position: absolute; top: 10px; left: 10px; z-index: 9999; display: flex; align-items: center; gap: 18px;">
        <div style="display: flex; align-items: center; gap: 4px;">
          <button type="button" class="refresh-button" id="settings-btn" title="Indicator Settings" style="color: #ffffff; font-weight: bold;">⚙️</button>
        </div>
        <div class="tf-selector">
          <button class="tf-btn active" data-tf="1m">1</button>
          <button class="tf-btn" data-tf="5m">5</button>
          <button class="tf-btn" data-tf="15m">15</button>
          <button class="tf-btn" data-tf="30m">30</button>
          <button class="tf-btn" data-tf="1h">1H</button>
          <button class="tf-btn" data-tf="4h">4H</button>
          <button class="tf-btn" data-tf="12h">12H</button>
          <button class="tf-btn" data-tf="1d">1D</button>
          <button class="tf-btn" data-tf="3d">3D</button>
        </div>
        <button class="refresh-button" id="refresh-btn-legacy" title="Refresh App (F5)" onclick="location.reload()" style="display:none;">🔄</button>
      </div>
      <!-- Bottom Control Panel (Scanners only) -->
      <div class="control-panel">


      </div>
      <!-- Quick Favorites Bar -->
      <div id="favorites-bar" class="favorites-bar"></div>
      


      <!-- Indicators Gear Modal -->
      <div id="indicators-gear-modal" class="modal-overlay" style="display: none; z-index: 10000; justify-content: center; align-items: center; background: rgb(0, 0, 0);">
        <div class="modal-content" style="width: 340px; max-width: 96%; background: #1e222d; padding: 14px; border-radius: 12px; border: 1px solid #333; max-height: 95dvh; display: flex; flex-direction: column; overflow: hidden;">
          <h3 style="color: #fff; margin-top: 0; margin-bottom: 8px; border-bottom: 1px solid #333; padding-bottom: 8px; font-size: 14px; flex-shrink: 0;">⚙️ Indicators & cRSI</h3>
          
          <!-- UI Zoom Controls -->
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; padding-bottom: 8px; border-bottom: 1px solid #333; flex-shrink: 0;">
             <span style="color: #fff; font-size: 13px;">UI Scale (Zoom)</span>
             <div style="display: flex; gap: 8px;">
               <button class="font-btn" id="font-minus" title="Perkecil Tampilan UI" style="min-width: 36px; height: 28px; border-radius: 6px; background: #333; color: white; border: 1px solid #444; cursor: pointer; font-weight: bold; display: flex; align-items: center; justify-content: center;">A-</button>
               <button class="font-btn" id="font-plus" title="Perbesar Tampilan UI" style="min-width: 36px; height: 28px; border-radius: 6px; background: #333; color: white; border: 1px solid #444; cursor: pointer; font-weight: bold; display: flex; align-items: center; justify-content: center;">A+</button>
             </div>
          </div>

          <div id="indicators-gear-form" style="display: flex; flex-direction: column; gap: 6px; flex: 1; overflow-y: auto; overflow-x: hidden; padding-right: 4px; -webkit-overflow-scrolling: touch;">
            <!-- Toggles will be generated by JS -->
          </div>
          <div style="display: flex; justify-content: flex-end; gap: 10px; margin-top: 10px; border-top: 1px solid #333; padding-top: 10px; flex-shrink: 0;">
            <button id="indicators-gear-close-btn" style="background: #333; color: #fff; border: none; padding: 8px 18px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 13px; min-height: 40px; touch-action: manipulation;">Close</button>
          </div>
        </div>
      </div>





    </div> <!-- Penutup app-container -->
    <!-- Floating Gear Button (Bottom Left) -->
    <button class="refresh-button" id="indicators-gear-btn" title="Indicator Toggles & cRSI Settings" style="position: fixed; bottom: 45px; left: 10px; z-index: 9999; color: #ffffff; font-weight: bold; padding: 0 10px; font-size: 20px; height: 38px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.3); background: rgb(30, 34, 45); box-shadow: 0 4px 10px rgba(0,0,0,0.5);  cursor: pointer; transition: transform 0.2s, background 0.2s;">⚙️</button>

    <!-- Floating Refresh FAB (Bottom Right) -->
    <button id="fab-refresh" class="fab-refresh" title="Refresh App">
      <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="23 4 23 10 17 10"></polyline>
        <polyline points="1 20 1 14 7 14"></polyline>
        <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
      </svg>
    </button>
  </body>
</html>
